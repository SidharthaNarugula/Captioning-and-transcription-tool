<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Captioning and Transcription Tool</title>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <header>
        <h1>AI Captioning and Transcription Tool</h1>
        <p>Upload your audio or video file to get real-time captions and transcription.</p>
    </header>
    <main>
        <!-- File Upload Section -->
        <section id="upload-section">
            <h2>Upload Your File</h2>
            <p id="file-status">No file selected</p>
            <input type="file" id="file-upload" accept="audio/*,video/*">
            
            <!-- Language Selection Dropdown -->
            <div class="button-container">
                <select id="language-select">
                    <option value="en">English</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="hi">Hindi</option>
                    <option value="te">Telugu</option>
                    <option value="kn">Kannada</option>
                    <option value="ta">Tamil</option>
                    <!-- Add more languages as needed -->
                </select>
                
                <!-- Separate containers for transcribe and translate buttons -->
                <div id="transcribe-container">
                    <button id="transcribe-button" disabled>Start Transcription</button>
                </div>
                
                <div id="translate-container" style="display: none;">
                    <button id="translate-button">Change Language</button>
                </div>
            </div>
            
            <p id="status-message" style="display: none; margin-top: 10px;"></p>
        </section>
        
        <!-- Real-Time Transcription Display -->
        <section id="transcription-section">
            <h2>Transcription</h2>
            <div id="transcription-output">
                <p>Transcription will appear here...</p>
            </div>
            <div id="timestamped-transcription" style="display: none; margin-top: 20px; padding: 15px; background-color: #f5f5f5; border-left: 4px solid #007bff;">
                <h3>Timestamped Transcription</h3>
                <div id="timestamps-container" style="font-size: 14px; line-height: 1.8;"></div>
            </div>
        </section>
        
        <!-- Download Transcription -->
        <section id="download-section" style="display: none;">
            <h2>Save Your Transcription</h2>
            <button id="download-button">Download Transcription (.txt)</button>
            <button id="download-timestamped-button">Download Timestamped Transcription (.txt)</button>
            <button id="generate-captions-button">Generate Captions (SRT)</button>
            <button id="download-captions-button" style="display: none;">Download Captions</button>
            <button id="clear-button" style="display: none; background-color: #dc3545;">Clear</button>
        </section>
    </main>
    <footer>
        <p>&copy; 2025 DT Lab project</p>
    </footer>
    
    <!-- Link to external JavaScript file -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
